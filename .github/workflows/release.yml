name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: claude-stats-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: claude-stats-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: claude-stats-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: claude-stats-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz claude-stats
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          REPO="cxj05h/claude-stats"

          # Download all tarballs and compute SHA256s
          for TARGET in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            URL="https://github.com/${REPO}/releases/download/${TAG}/claude-stats-${TARGET}.tar.gz"
            curl -fsSL "$URL" -o "/tmp/claude-stats-${TARGET}.tar.gz"
          done

          SHA_AARCH64_MAC=$(sha256sum /tmp/claude-stats-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_MAC=$(sha256sum /tmp/claude-stats-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_AARCH64_LINUX=$(sha256sum /tmp/claude-stats-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_X86_LINUX=$(sha256sum /tmp/claude-stats-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          # Clone tap, update formula, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/cxj05h/homebrew-tap.git" /tmp/tap
          cd /tmp/tap

          cat > Formula/claude-stats.rb << FORMULA
          class ClaudeStats < Formula
            desc "Terminal dashboard for Claude Code usage — session browser, token stats, chat history"
            homepage "https://github.com/cxj05h/claude-stats"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/claude-stats-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_MAC}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/claude-stats-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/claude-stats-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/claude-stats-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
            end

            def install
              bin.install "claude-stats"
            end

            test do
              assert_predicate bin/"claude-stats", :exist?
            end
          end
          FORMULA

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/claude-stats.rb
          git commit -m "chore: update claude-stats to ${VERSION}"
          git push
